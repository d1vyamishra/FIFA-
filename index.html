<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@900&family=Noto+Emoji&display=swap');

        :root {
            --bg-grid: #fffa;
            --text-main: #222;
            --bounce-speed: 0.35s;
            --ball-size: 50px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--text-main);
            font-family: "Libre Franklin", sans-serif;
            background-color: #ececec;
            background-image: 
                repeating-linear-gradient(45deg, var(--bg-grid) 0 1px, transparent 1px 30px), 
                repeating-linear-gradient(-45deg, var(--bg-grid) 0 1px, transparent 1px 30px);
            overflow: hidden;
        }

        .fifa-brand {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 900;
            line-height: 1;
            user-select: none;
        }

        .impact-zone {
            position: relative;
        }

        .squish-letter {
            display: inline-block;
            will-change: transform;
            transform-origin: bottom center;
            animation: squash-stretch var(--bounce-speed) ease both infinite alternate;
        }

        .bouncing-ball {
            position: absolute;
            bottom: 100%;
            left: 50%;
            translate: -50% 0;
            width: var(--ball-size);
            height: var(--ball-size);
            margin-bottom: calc(var(--ball-size) / 2);
            font-size: calc(var(--ball-size) * 0.85);
            font-family: "Noto Emoji", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
            animation: 
                ball-spin 3s linear infinite,
                ball-hop var(--bounce-speed) ease-out both infinite alternate;
        }

        @keyframes squash-stretch {
            0% { transform: scaleX(1.3) scaleY(0.7); }
            40% { transform: scaleX(1) scaleY(1); }
            100% { transform: scaleX(1) scaleY(1); }
        }

        @keyframes ball-hop {
            from { translate: -50% 100%; }
            to { translate: -50% -10%; }
        }

        @keyframes ball-spin {
            to { rotate: 360deg; }
        }
    </style>
</head>
<body>

    <div class="fifa-brand">
        <span>F</span>
        <span class="impact-zone">
            <span class="squish-letter">I</span>
            <span class="bouncing-ball">⚽</span>
        </span>
        <span>FA</span>
    </div>

</body>
</html>
